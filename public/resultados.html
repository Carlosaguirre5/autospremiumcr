<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Autos Usados en Costa Rica — Autos Premium CR</title>
<meta name="description" content="Buscá y encontrá autos usados en Costa Rica. Filtrá por marca, precio, año y provincia. Toyota, Honda, Hyundai, Kia y más.">
<meta name="keywords" content="autos usados Costa Rica, carros usados San José, Toyota usados CR, Honda usados Costa Rica">
<meta property="og:title" content="Autos Usados en Costa Rica — Autos Premium CR">
<meta property="og:description" content="Encontrá tu próximo auto en Autos Premium CR.">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="responsive.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0e1a;color:#fff}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(0,45,71,0.97);border-bottom:1px solid rgba(0,81,186,0.3);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-mark{background:#0051BA;color:#fff;font-weight:900;font-size:20px;padding:5px 9px;border-radius:6px}
.logo-text{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.logo-text span{color:#0051BA;background:#fff;padding:1px 4px;border-radius:3px;margin:0 2px}
nav ul{display:flex;gap:28px;list-style:none}
nav ul a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px}
.btn-nav{background:#0051BA;color:#fff;border:none;padding:9px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
.topbar{background:#060c17;border-bottom:1px solid rgba(255,255,255,0.07);padding:14px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar-search{flex:1;max-width:420px;position:relative}
.topbar-search input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;padding:9px 14px;font-size:14px;font-family:'Inter',sans-serif}
.topbar-search input:focus{outline:none;border-color:#0051BA}
.topbar-filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-chip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .2s}
.filter-chip:hover,.filter-chip.active{background:rgba(0,81,186,0.2);border-color:#0051BA;color:#6ab4ff}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.results-count{font-size:13px;color:rgba(255,255,255,0.4)}
.sort-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#fff;padding:7px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer}
.sort-select option{background:#002D47}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 120px)}
.sidebar{background:#060c17;border-right:1px solid rgba(255,255,255,0.07);padding:24px 20px;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto}
.filter-group{margin-bottom:28px}
.filter-group h4{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.filter-group select,.filter-group input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#fff;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;appearance:none;cursor:pointer}
.filter-group select option{background:#002D47}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-list{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:center;gap:8px;cursor:pointer}
.check-item input[type=checkbox]{accent-color:#0051BA;width:14px;height:14px}
.check-item label{font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer}
.btn-apply{width:100%;background:#0051BA;border:none;border-radius:7px;color:#fff;padding:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:20px 0}
.results-area{padding:24px 28px;background:#0a0e1a}
.cars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.car-card{background:#0d1929;border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s}
.car-card:hover{transform:translateY(-3px);border-color:rgba(0,81,186,0.45)}
.car-img{height:170px;background:linear-gradient(135deg,#001a2e,#002D47);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.car-img img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;text-transform:uppercase;z-index:1}
.badge-dest{background:#c8960a;color:#fff}
.badge-nuevo{background:#0051BA;color:#fff}
.car-info{padding:14px 16px}
.car-name{font-size:15px;font-weight:700;margin-bottom:3px}
.car-meta{display:flex;gap:10px;color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:11px}
.car-price{font-size:19px;font-weight:800}
.car-price-usd{font-size:11px;color:rgba(255,255,255,0.35);font-weight:400;margin-left:3px}
.car-footer{border-top:1px solid rgba(255,255,255,0.06);padding:9px 16px;display:flex;justify-content:space-between;align-items:center}
.car-loc{font-size:11px;color:rgba(255,255,255,0.35)}
.btn-contact{background:rgba(0,81,186,0.15);color:#6ab4ff;border:1px solid rgba(0,81,186,0.3);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:36px 0}
.page-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.page-btn.active{background:#0051BA;border-color:#0051BA;color:#fff;font-weight:700}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,0.4)}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="location.href='index.html'">
    <div class="logo-mark">AP</div>
    <div class="logo-text">AUTOS <span>PREMIUM</span> CR</div>
  </div>
  <ul>
    <li><a href="index.html">Inicio</a></li>
    <li><a href="resultados.html">Vehículos</a></li>
    <li><a href="valuador.html">Valuador IA</a></li><li><a href="blog.html">Blog</a></li>
    <li><a href="contacto.html">Contáctenos</a></li>
  </ul>
  <button class="btn-nav" onclick="location.href='publicar.html'">+ Publicar anuncio</button>
</nav>
<div class="topbar">
  <div class="topbar-search"><input type="text" id="searchInput" placeholder="🔍  Buscar marca, modelo..."></div>
  <div class="topbar-filters">
    <div class="filter-chip active" onclick="setChip(this)">Todos</div>
    <div class="filter-chip" onclick="setChip(this)">Sedán</div>
    <div class="filter-chip" onclick="setChip(this)">SUV</div>
    <div class="filter-chip" onclick="setChip(this)">Pickup</div>
    <div class="filter-chip" onclick="setChip(this)">Hatchback</div>
  </div>
  <div class="topbar-right">
    <span class="results-count" id="countLabel">Cargando...</span>
    <select class="sort-select" id="sortSel" onchange="page=1;loadCars()">
      <option value="desc">Más recientes</option>
      <option value="price_asc">Precio: menor a mayor</option>
      <option value="price_desc">Precio: mayor a menor</option>
    </select>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="filter-group">
      <h4>Marca</h4>
      <select id="fMarca">
        <option value="">Todas las marcas</option>
        <option>Toyota</option><option>Honda</option><option>Hyundai</option>
        <option>Kia</option><option>Nissan</option><option>Ford</option>
        <option>BMW</option><option>Mercedes-Benz</option><option>Chevrolet</option>
      </select>
    </div>
    <div class="filter-group">
      <h4>Año</h4>
      <div class="price-row">
        <input type="number" placeholder="Desde" id="yearFrom" min="2000" max="2026">
        <input type="number" placeholder="Hasta" id="yearTo" min="2000" max="2026">
      </div>
    </div>
    <div class="filter-group">
      <h4>Precio máximo (₡)</h4>
      <input type="number" placeholder="Ej: 15000000" id="precioMax">
    </div>
    <div class="filter-group">
      <h4>Kilometraje máx.</h4>
      <select id="fKm">
        <option value="">Cualquiera</option>
        <option value="20000">Hasta 20,000 km</option>
        <option value="50000">Hasta 50,000 km</option>
        <option value="100000">Hasta 100,000 km</option>
      </select>
    </div>
    <hr class="divider">
    <div class="filter-group">
      <h4>Combustible</h4>
      <div class="check-list">
        <div class="check-item"><input type="checkbox" id="c1"><label for="c1">Gasolina</label></div>
        <div class="check-item"><input type="checkbox" id="c2"><label for="c2">Diésel</label></div>
        <div class="check-item"><input type="checkbox" id="c3"><label for="c3">Híbrido</label></div>
        <div class="check-item"><input type="checkbox" id="c4"><label for="c4">Eléctrico</label></div>
      </div>
    </div>
    <hr class="divider">
    <div class="filter-group">
      <h4>Provincia</h4>
      <select id="fProv">
        <option value="">Todas</option>
        <option>San José</option><option>Alajuela</option><option>Heredia</option>
        <option>Cartago</option><option>Guanacaste</option><option>Puntarenas</option><option>Limón</option>
      </select>
    </div>
    <hr class="divider">
    <button class="btn-apply" onclick="page=1;loadCars()">Aplicar filtros</button>
  </div>
  <div class="results-area">
    <div class="cars-grid" id="grid"><div class="loading">Cargando vehículos...</div></div>
    <div class="pagination" id="pag"></div>
  </div>
</div>
<script>
var API='https://autospremiumcostarica.com/api';
var page=1;

function getFotos(fotos){
  try{ return typeof fotos==='string'?JSON.parse(fotos):(fotos||[]); }
  catch(e){ return []; }
}

function fmt(n){ return n?'₡'+parseInt(n).toLocaleString('es-CR'):'Consultar'; }
function fmtUsd(n){ return n?'~$'+Math.round(n/500).toLocaleString('en-US'):''; }

function setChip(el){
  document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  page=1;loadCars();
}

function buildParams(){
  var p=new URLSearchParams();
  var marca=document.getElementById('fMarca').value;
  var prov=document.getElementById('fProv').value;
  var km=document.getElementById('fKm').value;
  var pmax=document.getElementById('precioMax').value;
  var yf=document.getElementById('yearFrom').value;
  var yt=document.getElementById('yearTo').value;
  if(marca)p.append('marca',marca);
  if(prov)p.append('provincia',prov);
  if(km)p.append('km_max',km);
  if(pmax)p.append('precio_max',pmax);
  if(yf)p.append('anio_min',yf);
  if(yt)p.append('anio_max',yt);
  p.append('page',page);
  p.append('limit',9);
  return p.toString();
}

function renderCard(c){
  var fotos=getFotos(c.fotos);
  var imgHtml=fotos.length>0&&fotos[0].url
    ?'<img src="'+fotos[0].url+'" alt="'+( c.marca||'')+'">'
    :'<span style="font-size:60px">🚗</span>';
  return '<div class="car-card" onclick="location.href=\'detalle.html?id='+c.id+'\'">'+
    '<div class="car-img">'+
      (c.destacado?'<div class="badge badge-dest">Destacado</div>':'<div class="badge badge-nuevo">En venta</div>')+
      imgHtml+
    '</div>'+
    '<div class="car-info">'+
      '<div class="car-name">'+(c.marca||'')+' '+(c.modelo||'')+' '+(c.anio||'')+'</div>'+
      '<div class="car-meta">'+
        '<span>🛣️ '+(c.km?c.km.toLocaleString()+' km':'—')+'</span>'+
        '<span>⛽ '+(c.combustible||'—')+'</span>'+
      '</div>'+
      '<div class="car-price">'+fmt(c.precio)+'<span class="car-price-usd">'+fmtUsd(c.precio)+'</span></div>'+
    '</div>'+
    '<div class="car-footer">'+
      '<span class="car-loc">📍 '+(c.provincia||'Costa Rica')+'</span>'+
      '<button class="btn-contact">Ver más</button>'+
    '</div>'+
  '</div>';
}

async function loadCars(){
  document.getElementById('grid').innerHTML='<div class="loading">Cargando...</div>';
  try{
    var res=await fetch(API+'/anuncios?'+buildParams());
    var data=await res.json();
    var cars=data.anuncios||[];
    document.getElementById('countLabel').textContent=(data.total||0)+' vehículos encontrados';
    if(!cars.length){
      document.getElementById('grid').innerHTML='<div class="loading">No se encontraron vehículos.</div>';
      document.getElementById('pag').innerHTML='';
      return;
    }
    document.getElementById('grid').innerHTML=cars.map(renderCard).join('');
    var total=Math.ceil((data.total||0)/9);
    var pHtml='';
    for(var i=1;i<=Math.min(total,5);i++){
      pHtml+='<button class="page-btn'+(i===page?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    }
    document.getElementById('pag').innerHTML=pHtml;
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="loading">Error cargando anuncios.</div>';
  }
}

function goPage(p){ page=p; loadCars(); window.scrollTo(0,200); }

// Leer params de URL
var urlParams=new URLSearchParams(window.location.search);
if(urlParams.get('marca')) document.getElementById('fMarca').value=urlParams.get('marca');
if(urlParams.get('provincia')) document.getElementById('fProv').value=urlParams.get('provincia');

loadCars();
</script>
<script src="/chat.js"></script><script src="/chat_fix.js"></script><script src="/chat.js"></script><script src="/chat.js"></script></body>
</html>
